<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>JustinCua App Monitor</title>
  <style>
    :root{
      --bg:#07101f;
      --bg2:#0b1428;
      --panel:#111b31;
      --panel-2:#162340;
      --card:#0f1830;
      --text:#eff5ff;
      --muted:#8ea1c8;
      --line:rgba(255,255,255,.08);
      --line2:rgba(255,255,255,.06);
      --blue:#52a7ff;
      --cyan:#47d9ff;
      --green:#25d07b;
      --red:#ff6678;
      --yellow:#ffc857;
      --shadow:0 16px 44px rgba(0,0,0,.36);
      --radius:24px;
      --safe-bottom: max(18px, env(safe-area-inset-bottom));
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:radial-gradient(circle at top,#16274a 0%,#0b1325 34%,var(--bg) 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;overflow:hidden}
    body{min-height:100vh;display:grid;place-items:center}
    .shell{
      width:min(430px,100vw);
      height:min(900px,100vh);
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.015));
      border:1px solid rgba(255,255,255,.07);
      border-radius:32px;
      overflow:hidden;
      position:relative;
      box-shadow:var(--shadow);
      backdrop-filter: blur(14px);
      isolation:isolate;
    }
    @media (max-width: 520px){
      .shell{width:100vw;height:100vh;border-radius:0;border:none}
      body{display:block}
    }
    .shell::before{
      content:"";position:absolute;inset:auto -25% 58% auto;width:220px;height:220px;
      background:radial-gradient(circle,rgba(71,217,255,.18),rgba(71,217,255,0));pointer-events:none;
    }
    .shell::after{
      content:"";position:absolute;inset:-10% auto auto -30%;width:240px;height:240px;
      background:radial-gradient(circle,rgba(82,167,255,.18),rgba(82,167,255,0));pointer-events:none;
    }

    .screen{position:absolute;inset:0;display:flex;flex-direction:column;background:linear-gradient(180deg,rgba(9,15,30,.6),rgba(9,15,30,.98));}
    .top{
      padding:18px 18px 12px;
      border-bottom:1px solid var(--line2);
      background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015));
      backdrop-filter: blur(14px);
      z-index:3;
    }
    .head{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{min-width:0}
    .title{font-size:20px;font-weight:900;letter-spacing:.25px}
    .sub{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .top-actions{display:flex;gap:10px;align-items:center}
    .circle-btn{
      width:40px;height:40px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);
      display:grid;place-items:center;cursor:pointer;font-size:16px
    }
    .pill{
      display:inline-flex;align-items:center;gap:8px;height:34px;padding:0 12px;border-radius:999px;
      border:1px solid var(--line);background:rgba(255,255,255,.05);font-size:12px;font-weight:800
    }
    .dot{width:8px;height:8px;border-radius:50%}
    .dot.online{background:var(--green)}
    .dot.offline{background:var(--red)}
    .dot.warn{background:var(--yellow)}

    .searchbar{margin-top:12px;display:flex;gap:10px}
    .input{
      width:100%;height:46px;border-radius:16px;border:1px solid var(--line);outline:none;background:rgba(255,255,255,.045);
      color:var(--text);padding:0 14px;font-size:14px
    }
    .content{flex:1;overflow:auto;padding:14px 14px calc(92px + var(--safe-bottom));scrollbar-width:none}
    .content::-webkit-scrollbar{display:none}
    .view{display:none;animation:fade .18s ease}
    .view.active{display:block}
    @keyframes fade{from{opacity:.3;transform:translateY(4px)}to{opacity:1;transform:none}}

    .hero-card, .panel, .bot-card, .list-card, .settings-card{
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.025));
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
    }
    .hero-card{padding:16px 16px 14px;position:relative;overflow:hidden}
    .hero-card::after{content:"";position:absolute;inset:auto -16% -52% auto;width:190px;height:190px;background:radial-gradient(circle,rgba(82,167,255,.18),rgba(82,167,255,0));pointer-events:none}
    .hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .hero-name{font-size:22px;font-weight:900;line-height:1.1}
    .hero-meta{font-size:12px;color:var(--muted);margin-top:6px}
    .status-badge{padding:10px 12px;border-radius:999px;border:1px solid var(--line);font-size:12px;font-weight:900;white-space:nowrap}
    .status-badge.running{background:rgba(37,208,123,.12);color:var(--green)}
    .status-badge.paused{background:rgba(255,102,120,.12);color:var(--red)}
    .status-badge.stale{background:rgba(255,200,87,.12);color:var(--yellow)}

    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .mini{
      padding:12px;border-radius:18px;background:rgba(255,255,255,.03);border:1px solid var(--line2);min-height:86px
    }
    .mini .k{font-size:11px;color:var(--muted);margin-bottom:8px}
    .mini .v{font-size:14px;font-weight:800;line-height:1.2}
    .mini .big{font-size:30px;font-weight:900;line-height:1}
    .green{color:var(--green)} .red{color:var(--red)} .yellow{color:var(--yellow)} .blue{color:var(--blue)} .muted{color:var(--muted)}

    .section{margin-top:14px}
    .section-head{display:flex;align-items:center;justify-content:space-between;margin:0 4px 10px}
    .section-title{font-size:13px;font-weight:900;letter-spacing:.5px;color:#d8e8ff}
    .section-note{font-size:11px;color:var(--muted)}

    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid var(--line);font-size:12px;color:var(--muted)}
    .chip strong{color:var(--text)}

    .panel{padding:14px}
    .summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

    .bot-list{display:grid;gap:10px}
    .bot-card{padding:14px}
    .bot-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .bot-name{font-size:17px;font-weight:900}
    .bot-meta{font-size:12px;color:var(--muted);margin-top:4px}
    .kv{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
    .kv .mini{min-height:0;padding:10px;border-radius:16px}
    .kv .v{font-size:16px}

    .rank-list{display:grid;gap:10px}
    .rank-item,.log-item{display:flex;gap:12px;align-items:flex-start;padding:12px;border-radius:18px;background:rgba(255,255,255,.035);border:1px solid var(--line2)}
    .rank-num{width:34px;height:34px;border-radius:14px;display:grid;place-items:center;background:rgba(255,255,255,.06);font-weight:900}
    .rank-main{flex:1;min-width:0}
    .rank-title{font-size:14px;font-weight:900}
    .rank-sub{font-size:12px;color:var(--muted);margin-top:3px}
    .rank-val{text-align:right;font-size:14px;font-weight:900}

    .log-item{display:block;font-size:13px;line-height:1.45}
    .log-time{font-size:11px;color:var(--muted);margin-bottom:6px}

    .settings-card{padding:14px;display:grid;gap:12px}
    .field{display:grid;gap:7px}
    .field label{font-size:12px;color:var(--muted)}
    .setting-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
    .btn{
      height:44px;padding:0 16px;border-radius:16px;border:1px solid var(--line);background:linear-gradient(135deg,#2d8cff,#1ec7ff);color:white;font-weight:800;cursor:pointer
    }
    .btn.secondary{background:rgba(255,255,255,.04);color:var(--text)}
    .btn.ghost{background:rgba(255,255,255,.03);color:var(--muted)}
    .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .tiny{font-size:11px;color:var(--muted);line-height:1.5}
    .empty{padding:18px;text-align:center;border-radius:18px;background:rgba(255,255,255,.03);border:1px dashed var(--line);color:var(--muted)}

    .nav{
      position:absolute;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));
      display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px;border-radius:24px;
      background:rgba(10,16,31,.92);border:1px solid var(--line);backdrop-filter:blur(18px);z-index:5
    }
    .nav-btn{
      border:none;background:transparent;color:var(--muted);padding:8px 4px;border-radius:16px;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;font-size:11px;font-weight:800
    }
    .nav-btn .icon{font-size:17px;line-height:1}
    .nav-btn.active{background:rgba(82,167,255,.14);color:var(--text);box-shadow:inset 0 0 0 1px rgba(82,167,255,.16)}
    .hidden{display:none !important}
  </style>
</head>
<body>
  <div class="shell">
    <div class="screen">
      <div class="top">
        <div class="head">
          <div class="brand">
            <div class="title">JUSTINCUA APP</div>
            <div class="sub" id="metaText">Đang tải dữ liệu realtime...</div>
          </div>
          <div class="top-actions">
            <div class="pill"><span class="dot warn" id="globalDot"></span><span id="globalState">Đang đồng bộ</span></div>
            <button class="circle-btn" id="refreshBtn" aria-label="Làm mới">↻</button>
          </div>
        </div>
        <div class="searchbar">
          <input class="input" id="search" placeholder="Tìm ID, bot, symbol..." />
        </div>
      </div>

      <div class="content">
        <section class="view active" id="view-home">
          <div class="hero-card" id="heroCard"></div>

          <div class="section">
            <div class="section-head">
              <div class="section-title">TỔNG QUAN</div>
              <div class="section-note" id="summaryTime">--</div>
            </div>
            <div class="panel">
              <div class="summary-grid" id="summaryGrid"></div>
            </div>
          </div>

          <div class="section">
            <div class="section-head">
              <div class="section-title">TRẠNG THÁI NHANH</div>
              <div class="section-note">1 khung hình, kiểu app</div>
            </div>
            <div class="chips" id="quickChips"></div>
          </div>
        </section>

        <section class="view" id="view-bots">
          <div class="section-head">
            <div class="section-title">DANH SÁCH BOT</div>
            <div class="section-note" id="botsCount">0 bot</div>
          </div>
          <div class="bot-list" id="botList"></div>
        </section>

        <section class="view" id="view-profit">
          <div class="section">
            <div class="section-head">
              <div class="section-title">TOP % VỐN THỰC</div>
              <div class="section-note">xếp hạng realtime</div>
            </div>
            <div class="panel">
              <div class="rank-list" id="rankPct"></div>
            </div>
          </div>
          <div class="section">
            <div class="section-head">
              <div class="section-title">TOP LÃI VỐN THỰC</div>
              <div class="section-note">profit thực</div>
            </div>
            <div class="panel">
              <div class="rank-list" id="rankProfit"></div>
            </div>
          </div>
        </section>

        <section class="view" id="view-logs">
          <div class="section-head">
            <div class="section-title">LOG / NHẬT KÝ CẦU NỐI</div>
            <div class="section-note">server + trạng thái web</div>
          </div>
          <div class="panel">
            <div class="rank-list" id="logList"></div>
          </div>
        </section>

        <section class="view" id="view-settings">
          <div class="settings-card">
            <div class="field">
              <label>Bridge URL</label>
              <input class="input" id="baseUrl" value="https://cpanel-production.up.railway.app" />
            </div>
            <div class="field">
              <label>Token</label>
              <input class="input" id="token" value="cua" />
            </div>
            <div class="setting-row">
              <div>
                <div style="font-size:14px;font-weight:900">Tự làm mới</div>
                <div class="tiny">Dùng cho giao diện app realtime.</div>
              </div>
              <button class="btn secondary" id="toggleAutoBtn">Tắt auto</button>
            </div>
            <div class="field">
              <label>Chu kỳ làm mới (ms)</label>
              <input class="input" id="refreshMs" type="number" min="500" step="500" value="1000" />
            </div>
            <div class="btn-row">
              <button class="btn" id="applyBtn">Áp dụng</button>
              <button class="btn ghost" id="resetBtn">Mặc định</button>
            </div>
            <div class="tiny" id="diagnosticText">Chưa có dữ liệu.</div>
          </div>
        </section>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-tab="home"><span class="icon">⌂</span><span>Home</span></button>
        <button class="nav-btn" data-tab="bots"><span class="icon">◫</span><span>Bots</span></button>
        <button class="nav-btn" data-tab="profit"><span class="icon">↗</span><span>Profit</span></button>
        <button class="nav-btn" data-tab="logs"><span class="icon">☰</span><span>Logs</span></button>
        <button class="nav-btn" data-tab="settings"><span class="icon">⚙</span><span>Menu</span></button>
      </nav>
    </div>
  </div>

  <script>
    const els = {
      baseUrl: document.getElementById('baseUrl'),
      token: document.getElementById('token'),
      search: document.getElementById('search'),
      refreshBtn: document.getElementById('refreshBtn'),
      toggleAutoBtn: document.getElementById('toggleAutoBtn'),
      refreshMs: document.getElementById('refreshMs'),
      applyBtn: document.getElementById('applyBtn'),
      resetBtn: document.getElementById('resetBtn'),
      metaText: document.getElementById('metaText'),
      globalDot: document.getElementById('globalDot'),
      globalState: document.getElementById('globalState'),
      summaryTime: document.getElementById('summaryTime'),
      heroCard: document.getElementById('heroCard'),
      summaryGrid: document.getElementById('summaryGrid'),
      quickChips: document.getElementById('quickChips'),
      botsCount: document.getElementById('botsCount'),
      botList: document.getElementById('botList'),
      rankPct: document.getElementById('rankPct'),
      rankProfit: document.getElementById('rankProfit'),
      logList: document.getElementById('logList'),
      diagnosticText: document.getElementById('diagnosticText'),
      navBtns: [...document.querySelectorAll('.nav-btn')],
      views: [...document.querySelectorAll('.view')],
    };

    let autoRefresh = true;
    let timer = null;
    let refreshInterval = 1000;
    let lastPayload = null;
    let fetchEpochSec = 0;
    const seenMap = new Map();
    const snapshotMap = new Map();

    function escapeHtml(s){
      return String(s ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#39;');
    }

    function fmtNum(v, digits=2){
      const n = Number(v);
      if(!Number.isFinite(n)) return '--';
      return n.toLocaleString('en-US',{minimumFractionDigits:digits,maximumFractionDigits:digits});
    }

    function fmtAgo(tsSec){
      const t = Number(tsSec);
      if(!Number.isFinite(t) || t <= 0) return 'không rõ';
      const diff = Math.max(0, fetchEpochSec - t);
      if(diff < 2) return 'vừa xong';
      if(diff < 60) return `${diff}s trước`;
      if(diff < 3600) return `${Math.floor(diff/60)}m trước`;
      return `${Math.floor(diff/3600)}h trước`;
    }

    function parseTimestamp(v){
      if(v == null || v === '') return 0;
      if(typeof v === 'number'){
        if(v > 1e12) return Math.floor(v/1000);
        if(v > 1e9) return Math.floor(v);
        return 0;
      }
      const s = String(v).trim();
      if(!s) return 0;
      if(/^\d+$/.test(s)){
        const n = Number(s);
        if(n > 1e12) return Math.floor(n/1000);
        if(n > 1e9) return Math.floor(n);
      }
      const iso = Date.parse(s);
      if(Number.isFinite(iso)) return Math.floor(iso/1000);
      return 0;
    }

    function normMode(v){
      const s = String(v ?? '--').trim();
      if(!s) return '--';
      if(s === 'mode_247') return '24/7';
      return s;
    }

    function itemKey(raw){
      const id = raw.id ?? raw.accountID ?? raw.accountId ?? raw.login ?? '';
      const bot = raw.bot ?? raw.botName ?? raw.name ?? 'Unknown';
      const symbol = raw.symbol ?? '--';
      return `${id}|${bot}|${symbol}`;
    }

    function keepAliveByChange(key, core){
      const prev = snapshotMap.get(key);
      const serialized = JSON.stringify(core);
      if(prev !== serialized){
        snapshotMap.set(key, serialized);
        seenMap.set(key, fetchEpochSec);
      }
    }

    function normItem(raw){
      const key = itemKey(raw);
      const id = raw.id ?? raw.accountID ?? raw.accountId ?? raw.login ?? '';
      const bot = raw.bot ?? raw.botName ?? raw.name ?? 'Unknown';
      const symbol = raw.symbol ?? '--';
      const balance = Number(raw.balance ?? raw.totalcapital ?? 0);
      const equity = Number(raw.equity ?? raw.aftercapital ?? 0);
      const realProfit = Number(raw.realProfit ?? raw.realprofit ?? 0);
      const realPct = Number(raw.realPct ?? raw.realpct ?? 0);
      const dayTotal = Number(raw.dayTotal ?? raw.afterprofit ?? raw.daytotal ?? 0);
      const dd = Number(raw.dd ?? raw.maxdd ?? 0);
      const status = String(raw.status ?? raw.statusvi ?? 'UNKNOWN').toUpperCase();
      const timeMode = normMode(raw.timeMode ?? raw.timemode ?? '--');
      const tsRaw = raw.ts ?? raw.lastTs ?? raw.lastSeenTs ?? raw.updatedAtTs ?? raw.updated_at_ts ?? raw.heartbeat_ts ?? raw.eaupdate ?? raw.updatedAt ?? raw.server_time ?? raw.last_seen;
      const parsedTs = parseTimestamp(tsRaw);
      const reason = raw.reason ?? raw.statusreason ?? raw.note ?? '';

      keepAliveByChange(key, { balance, equity, realProfit, realPct, dayTotal, dd, status, timeMode });
      if(parsedTs > 0) seenMap.set(key, parsedTs);
      const ts = Math.max(parsedTs, seenMap.get(key) || 0);

      return { key, id, bot, symbol, balance, equity, realProfit, realPct, dayTotal, dd, status, timeMode, ts, reason, raw };
    }

    function heartbeatState(item){
      const age = item.ts > 0 ? Math.max(0, fetchEpochSec - item.ts) : 999999;
      const run = item.status.includes('RUN');
      const pause = item.status.includes('PAUSE');
      if(age <= 15) return { label: run ? 'Đang online' : (pause ? 'Online / Pause' : 'Online'), cls: run ? 'running' : 'paused', online:true };
      if(age <= 45) return { label: 'Heartbeat chậm', cls: 'stale', online:true };
      return { label: 'Mất heartbeat', cls: 'stale', online:false };
    }

    function filterItems(items){
      const q = els.search.value.trim().toLowerCase();
      if(!q) return items;
      return items.filter(x =>
        String(x.id).toLowerCase().includes(q) ||
        String(x.bot).toLowerCase().includes(q) ||
        String(x.symbol).toLowerCase().includes(q)
      );
    }

    function bestHero(items){
      if(!items.length) return null;
      return [...items].sort((a,b) => {
        const ah = heartbeatState(a).online ? 1 : 0;
        const bh = heartbeatState(b).online ? 1 : 0;
        if(bh !== ah) return bh - ah;
        return b.realPct - a.realPct;
      })[0];
    }

    function metricCard(k,v,cls=''){ return `<div class="mini"><div class="k">${k}</div><div class="v ${cls}">${v}</div></div>`; }

    function renderHome(items){
      const hero = bestHero(items);
      if(!hero){
        els.heroCard.innerHTML = '<div class="empty">Chưa có bot nào để hiển thị.</div>';
      } else {
        const hb = heartbeatState(hero);
        const pCls = hero.realProfit >= 0 ? 'green' : 'red';
        const pctCls = hero.realPct >= 0 ? 'green' : 'red';
        const dayCls = hero.dayTotal >= 0 ? 'green' : 'red';
        els.heroCard.innerHTML = `
          <div class="hero-top">
            <div>
              <div class="hero-name">${escapeHtml(hero.bot)}</div>
              <div class="hero-meta">ID ${escapeHtml(hero.id || '--')} • ${escapeHtml(hero.symbol)} • ${escapeHtml(hero.timeMode)}</div>
            </div>
            <div class="status-badge ${hb.cls}">${hb.label}</div>
          </div>
          <div class="stats-grid">
            <div class="mini"><div class="k">Lãi vốn thực</div><div class="big ${pCls}">${fmtNum(hero.realProfit)}</div></div>
            <div class="mini"><div class="k">% vốn thực</div><div class="big ${pctCls}">${fmtNum(hero.realPct)}%</div></div>
            ${metricCard('Balance', fmtNum(hero.balance))}
            ${metricCard('Equity', fmtNum(hero.equity))}
            ${metricCard('Tổng hôm nay', `<span class="${dayCls}">${fmtNum(hero.dayTotal)}</span>`)}
            ${metricCard('DD', `<span class="${hero.dd > 0 ? 'red' : 'blue'}">${fmtNum(hero.dd)}%</span>`)}
          </div>
        `;
      }

      const online = items.filter(x => heartbeatState(x).online).length;
      const running = items.filter(x => x.status.includes('RUN')).length;
      const paused = items.filter(x => x.status.includes('PAUSE')).length;
      const totalProfit = items.reduce((sum, x) => sum + (Number.isFinite(x.realProfit) ? x.realProfit : 0), 0);
      const avgPct = items.length ? (items.reduce((sum, x) => sum + (Number.isFinite(x.realPct) ? x.realPct : 0), 0) / items.length) : 0;
      const sumEquity = items.reduce((sum, x) => sum + (Number.isFinite(x.equity) ? x.equity : 0), 0);

      els.summaryGrid.innerHTML = [
        ['Tổng bot', items.length, 'blue'],
        ['Bot online', online, online ? 'green' : 'red'],
        ['RUNNING', running, running ? 'green' : 'yellow'],
        ['PAUSED', paused, paused ? 'red' : 'blue'],
        ['Tổng equity', fmtNum(sumEquity), 'blue'],
        ['Tổng lãi vốn thực', fmtNum(totalProfit), totalProfit >= 0 ? 'green' : 'red'],
        ['TB % vốn thực', `${fmtNum(avgPct)}%`, avgPct >= 0 ? 'green' : 'red'],
        ['Cập nhật', fetchEpochSec ? new Date(fetchEpochSec * 1000).toLocaleTimeString('vi-VN') : '--', 'muted'],
      ].map(([k,v,cls]) => metricCard(k, v, cls)).join('');

      const chips = [
        `<span class="chip"><strong>${online}</strong> bot còn heartbeat</span>`,
        `<span class="chip"><strong>${running}</strong> bot đang RUNNING</span>`,
        `<span class="chip"><strong>${paused}</strong> bot đang PAUSED</span>`,
        `<span class="chip"><strong>${items.length ? bestHero(items).bot : '--'}</strong> đang nổi bật</span>`,
      ];
      els.quickChips.innerHTML = chips.join('');
      els.summaryTime.textContent = fetchEpochSec ? `Server ${new Date(fetchEpochSec * 1000).toLocaleTimeString('vi-VN')}` : '--';
    }

    function renderBots(items){
      els.botsCount.textContent = `${items.length} bot`;
      if(!items.length){
        els.botList.innerHTML = '<div class="empty">Không có bot nào khớp từ khóa.</div>';
        return;
      }
      const rows = [...items].sort((a,b) => {
        const ah = heartbeatState(a).online ? 1 : 0;
        const bh = heartbeatState(b).online ? 1 : 0;
        if(bh !== ah) return bh - ah;
        return b.realPct - a.realPct;
      });
      els.botList.innerHTML = rows.map((x) => {
        const hb = heartbeatState(x);
        const pCls = x.realProfit >= 0 ? 'green' : 'red';
        const pctCls = x.realPct >= 0 ? 'green' : 'red';
        const dayCls = x.dayTotal >= 0 ? 'green' : 'red';
        return `
          <div class="bot-card">
            <div class="bot-top">
              <div>
                <div class="bot-name">${escapeHtml(x.bot)}</div>
                <div class="bot-meta">ID ${escapeHtml(x.id || '--')} • ${escapeHtml(x.symbol)} • ${escapeHtml(x.timeMode)}</div>
              </div>
              <div class="status-badge ${hb.cls}">${hb.label}</div>
            </div>
            <div class="kv">
              <div class="mini"><div class="k">Balance</div><div class="v">${fmtNum(x.balance)}</div></div>
              <div class="mini"><div class="k">Equity</div><div class="v">${fmtNum(x.equity)}</div></div>
              <div class="mini"><div class="k">DD</div><div class="v ${x.dd > 0 ? 'red' : 'blue'}">${fmtNum(x.dd)}%</div></div>
              <div class="mini"><div class="k">Lãi vốn thực</div><div class="v ${pCls}">${fmtNum(x.realProfit)}</div></div>
              <div class="mini"><div class="k">% vốn thực</div><div class="v ${pctCls}">${fmtNum(x.realPct)}%</div></div>
              <div class="mini"><div class="k">Tổng hôm nay</div><div class="v ${dayCls}">${fmtNum(x.dayTotal)}</div></div>
            </div>
            <div class="bot-meta" style="margin-top:10px">Cập nhật ${fmtAgo(x.ts)}${x.reason ? ' • ' + escapeHtml(x.reason) : ''}</div>
          </div>
        `;
      }).join('');
    }

    function renderRank(listEl, items, field, suffix=''){
      if(!items.length){
        listEl.innerHTML = '<div class="empty">Chưa có dữ liệu xếp hạng.</div>';
        return;
      }
      const rows = [...items].sort((a,b) => (Number(b[field])||0) - (Number(a[field])||0)).slice(0, 10);
      listEl.innerHTML = rows.map((x, i) => {
        const val = Number(x[field]) || 0;
        return `
          <div class="rank-item">
            <div class="rank-num">${i + 1}</div>
            <div class="rank-main">
              <div class="rank-title">${escapeHtml(x.bot)}</div>
              <div class="rank-sub">ID ${escapeHtml(x.id || '--')} • ${escapeHtml(x.symbol)} • ${heartbeatState(x).label}</div>
            </div>
            <div class="rank-val ${val >= 0 ? 'green' : 'red'}">${fmtNum(val)}${suffix}</div>
          </div>
        `;
      }).join('');
    }

    function renderLogs(payload, items){
      const logs = Array.isArray(payload?.logs) ? payload.logs.slice(0, 16) : [];
      const entries = [];
      entries.push(`Web fetch OK • ${items.length} bot • ${new Date(fetchEpochSec * 1000).toLocaleTimeString('vi-VN')}`);
      if(payload?.server_time) entries.push(`Server time: ${payload.server_time}`);
      if(logs.length) entries.push(...logs.map(x => typeof x === 'string' ? x : JSON.stringify(x)));
      els.logList.innerHTML = entries.length ? entries.map((x, i) => `
        <div class="log-item">
          <div class="log-time">#${i + 1}</div>
          ${escapeHtml(x)}
        </div>
      `).join('') : '<div class="empty">Chưa có logs.</div>';
    }

    function updateHeader(items){
      const online = items.filter(x => heartbeatState(x).online).length;
      const total = items.length;
      const serverText = fetchEpochSec ? new Date(fetchEpochSec * 1000).toLocaleTimeString('vi-VN') : '--';
      els.metaText.textContent = `Realtime ${online}/${total} bot • ${serverText}`;
      if(total === 0){
        els.globalDot.className = 'dot warn';
        els.globalState.textContent = 'Chưa có bot';
        return;
      }
      if(online > 0){
        els.globalDot.className = 'dot online';
        els.globalState.textContent = `${online} online`;
      } else {
        els.globalDot.className = 'dot offline';
        els.globalState.textContent = 'Không có heartbeat';
      }
    }

    function setDiagnostic(text){
      els.diagnosticText.textContent = text;
    }

    function renderAll(payload){
      const rawItems = Array.isArray(payload?.items) ? payload.items : [];
      const items = filterItems(rawItems.map(normItem));
      updateHeader(items);
      renderHome(items);
      renderBots(items);
      renderRank(els.rankPct, items, 'realPct', '%');
      renderRank(els.rankProfit, items, 'realProfit', '');
      renderLogs(payload, items);
      setDiagnostic(`Auto ${autoRefresh ? 'ON' : 'OFF'} • Refresh ${refreshInterval}ms • Bot hiển thị ${items.length}`);
    }

    async function fetchSummary(){
      const base = els.baseUrl.value.trim().replace(/\/$/, '');
      const token = els.token.value.trim();
      if(!base || !token) return;
      try{
        const url = `${base}/panel/summary?token=${encodeURIComponent(token)}&_=${Date.now()}`;
        const res = await fetch(url, { cache: 'no-store' });
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        fetchEpochSec = parseTimestamp(json?.server_time) || Math.floor(Date.now() / 1000);
        lastPayload = json;
        renderAll(json);
      } catch(err){
        fetchEpochSec = Math.floor(Date.now() / 1000);
        els.globalDot.className = 'dot offline';
        els.globalState.textContent = 'Lỗi tải';
        els.metaText.textContent = `Lỗi tải dữ liệu: ${err.message}`;
        const html = `<div class="empty">Không lấy được dữ liệu từ server.<br>${escapeHtml(err.message)}</div>`;
        els.heroCard.innerHTML = html;
        els.summaryGrid.innerHTML = html;
        els.quickChips.innerHTML = '';
        els.botList.innerHTML = html;
        els.rankPct.innerHTML = html;
        els.rankProfit.innerHTML = html;
        els.logList.innerHTML = html;
        setDiagnostic(`Lỗi: ${err.message}`);
      }
    }

    function restartAuto(){
      if(timer) clearInterval(timer);
      if(!autoRefresh) return;
      timer = setInterval(fetchSummary, refreshInterval);
    }

    function activateTab(tab){
      els.navBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
      els.views.forEach(view => view.classList.toggle('active', view.id === `view-${tab}`));
    }

    els.navBtns.forEach(btn => btn.addEventListener('click', () => activateTab(btn.dataset.tab)));
    els.refreshBtn.addEventListener('click', fetchSummary);
    els.toggleAutoBtn.addEventListener('click', () => {
      autoRefresh = !autoRefresh;
      els.toggleAutoBtn.textContent = autoRefresh ? 'Tắt auto' : 'Bật auto';
      restartAuto();
      setDiagnostic(`Auto ${autoRefresh ? 'ON' : 'OFF'} • Refresh ${refreshInterval}ms`);
    });
    els.applyBtn.addEventListener('click', () => {
      refreshInterval = Math.max(500, Number(els.refreshMs.value) || 1000);
      restartAuto();
      fetchSummary();
      setDiagnostic(`Đã áp dụng • ${refreshInterval}ms`);
    });
    els.resetBtn.addEventListener('click', () => {
      els.baseUrl.value = 'https://cpanel-production.up.railway.app';
      els.token.value = 'cua';
      els.refreshMs.value = 1000;
      refreshInterval = 1000;
      autoRefresh = true;
      els.toggleAutoBtn.textContent = 'Tắt auto';
      restartAuto();
      fetchSummary();
      setDiagnostic('Đã về mặc định.');
    });
    els.search.addEventListener('input', () => {
      if(lastPayload) renderAll(lastPayload);
    });
    [els.baseUrl, els.token].forEach(el => el.addEventListener('change', fetchSummary));

    fetchSummary();
    restartAuto();
  </script>
</body>
</html>
